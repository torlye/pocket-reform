image: debian:unstable-slim

build:
  artifacts:
    paths:
      - pocket-reform-sysctl-fw/build/sysctl.uf2
      - pocket-reform-sysctl-fw/build/sysctl-recovery-mode.uf2
      - pocket-reform-sysctl-fw/build/sysctl.cab
      - scripts/update-sysctl-firmware.sh
      - scripts/update-keyboard-firmware.sh
      - pocket-reform-keyboard-fw/pocket-hid/build/pocket-hid.uf2
      - pocket-reform-keyboard-fw/pocket-hid/build/pocket-hid.cab
  script:
    - ./install-fw-dependencies.sh
    - |
      # use the timestamp of the latest git commit to set reproducible S_D_E
      if [ -z ${SOURCE_DATE_EPOCH:+x} ] && git -C . rev-parse 2>/dev/null; then
        SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
      fi
      # check if the current commit is tagged or otherwise use the git hash
      if git describe >/dev/null 2>&1 && [ "$(git describe --abbrev=0)" = "$(git describe)" ]; then
        VERSION="$(git describe --abbrev=0 | tr -d -)"
      else
        VERSION="g$(git rev-parse --short=7 HEAD)"
      fi
    - export MNTRE_FIRMWARE_VERSION="$VERSION"
    #
    # find bugs like dynamic memory allocation in firmware
    - scripts/cppcheck.sh
    #
    - echo "Building sysctl-recovery-mode firmware"
    - env --chdir=pocket-reform-sysctl-fw MNTRE_FACTORY_MODE=1 ./build.sh
    - cp pocket-reform-sysctl-fw/build/sysctl.uf2 pocket-reform-sysctl-fw/build/sysctl-recovery-mode.uf2
    #
    - echo "Building sysctl firmware"
    - env --chdir=pocket-reform-sysctl-fw ./build.sh
    #
    - echo "Building keyboard firmware"
    - env --chdir=pocket-reform-keyboard-fw/pocket-hid ./build.sh

lvfs-upload:
  needs:
    - build
  rules:
    - if: ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_TAG) && $LVFS_UPLOAD_NETRC
  before_script:
    - apt-get --update --no-install-recommends -y install curl ca-certificates jq
  script:
    - ./upload-fw.sh embargo pocket-reform-keyboard-fw/pocket-hid/build/pocket-hid.cab "$LVFS_UPLOAD_NETRC"
    - sleep 5  # https://gitlab.com/fwupd/lvfs-website/-/issues/1037#note_2786314058
    - ./upload-fw.sh embargo pocket-reform-sysctl-fw/build/sysctl.cab "$LVFS_UPLOAD_NETRC"
