image: debian:unstable-slim

build:
  artifacts:
    paths:
      - pocket-reform-sysctl-fw/build/sysctl.uf2
      - pocket-reform-sysctl-fw/build/sysctl.cab
      - scripts/update-sysctl-firmware.sh
      - pocket-reform-keyboard-fw/pocket-hid/build/pocket-hid.uf2
  script:
    - ./install-fw-dependencies.sh
    - export SOURCE_ROOT="$PWD"
    - |
      # use the timestamp of the latest git commit to set reproducible S_D_E
      if [ -z ${SOURCE_DATE_EPOCH:+x} ] && git -C . rev-parse 2>/dev/null; then
        SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
      fi
      # check if the current commit is tagged or otherwise use the git hash
      if git describe >/dev/null 2>&1 && [ "$(git describe --abbrev=0)" = "$(git describe)" ]; then
        VERSION="$(git describe --abbrev=0 | tr -d -)"
      else
        VERSION="g$(git rev-parse --short=7 HEAD)"
      fi
    - export PICO_SDK_PATH="$SOURCE_ROOT/pico-sdk"
    #
    - echo "Building sysctl firmware"
    - cd "$SOURCE_ROOT/pocket-reform-sysctl-fw"
    - mkdir -p build && cd build
    - MNTRE_FIRMWARE_VERSION="${VERSION}" cmake .. && make -j $(nproc)
    #
    - echo "Building keyboard firmware"
    - cd "$SOURCE_ROOT/pocket-reform-keyboard-fw/pocket-hid"
    - mkdir -p build && cd build
    - cmake -DFAMILY=rp2040 .. && make -j $(nproc)
